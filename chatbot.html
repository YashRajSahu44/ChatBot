<!DOCTYPE html>
<html>
  <head>
    <title>ChatBot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel"> 
    
    function ChatInput({chatMessages, setChatMessages}){
      const [inputText, setInputText] = React.useState('');
      function saveInputText(event){
        setInputText(event.target.value)
      }

      function sendMessage() {
        const newChatMessages = [
        ...chatMessages,
        {
          message: inputText,
          sender: 'user',
          id: crypto.randomUUID()
        }
      ];

         setChatMessages(newChatMessages);      

      const response = Chatbot.getResponse(inputText);
      setChatMessages([
        ...newChatMessages,
        {
          message: response,
          sender: 'Oi',
          id: crypto.randomUUID()
        }
      ]);      

      setInputText(''); // Controlled input
      }

      return (
        <>
          <input 
            placeholder = "Send a message to Oi-o"
            onChange={saveInputText}
            value={inputText}
          />
          <button
            onClick={sendMessage}
          >Send</button>
        </>
      );
    }

    function ChatMessage({message,sender}){
      // const message = props.message;
      // const sender = props.sender;
      // const {message , sender} = props; // Shortcut of above 2 codes , There is aother shortcut by just replacing props above to message and sender 

     /* if(sender === 'Oi'){
          return(
            <div>
              <img src="robot.png" width ="30px"/>
              {message}
            </div>
      );
      }
      */

      return(
        <div>
          {sender == 'Oi' && (
            <img src="robot.png" width ="40px"/>
          )}
          {message}
          {sender == 'user' &&  (
            <img src="user.png" width ="40px"/>
          )}
        </div>
      );
    }

    function ChatMessages({ chatMessages }) { 
      return(
       <>
        {chatMessages.map((chatMessage)=>{
             return(
             <ChatMessage
               message = {chatMessage.message}
               sender = {chatMessage.sender}
               key={chatMessage.id}
             />
            );
        })}
       </>
      );
    }

    function App(){
       const [chatMessages , setChatMessages] = React.useState([{


        message: 'Hello Oi',
        sender: 'user',
        id: 'id1'
    },{
      message:'Hello!How can i help you?',
      sender:'Oi',
      id: 'id2'
    },{
      message:'Can you get me todays date?',
      sender: 'user',
      id: 'id3'
    },{
      message: 'Today is June 26',
      sender: 'Oi',
      id: 'id4'
    }]);

    // const [chatMessages , setChatMessages] = array; //Shortcut of below two lines:Array destructing
    
    // const chatMessages = array[0];
    //  const setChatMessages = array[1]; // Updater function

     return(
       <>
         <ChatInput 
           chatMessages={chatMessages}
           setChatMessages={setChatMessages} 
       />
         <ChatMessages
           chatMessages={chatMessages}
         />
    </>
  );
}
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App></App>);
    </script>
  </body>
</html>
